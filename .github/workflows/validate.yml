# Workflow OFICIAL da plataforma (reusable workflow).
# Roda o gate (testes travados) e ENVIA o cracha OIDC para a sua API decidir.

name: CommitCert Validate (oficial)

on:
  workflow_call:
    inputs:
      course:
        description: "ID do curso (ex.: backend-go-03-http)"
        required: true
        type: string
      api_url:
        description: "URL publica da sua API (em dev, a URL do tunel)"
        required: true
        type: string

permissions:
  id-token: write   # para pedir o cracha OIDC
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o codigo do aluno
        uses: actions/checkout@v4

      - name: Preparar o Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # GATE: testes travados precisam passar. Se falharem, o job para aqui
      # (vermelho) e nem chega a chamar a API.
      - name: Rodar os testes travados (gate)
        run: node --test

      - name: Enviar OIDC para a API de validacao
        run: |
          # 1) Pede o cracha OIDC, endereçado para a sua API (audience).
          TOKEN=$(curl -sS \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api.commitcert.io" \
            | jq -r '.value')

          # 2) Monta o corpo JSON com seguranca (jq -n evita problema de aspas).
          BODY=$(jq -n --arg jwt "$TOKEN" --arg course "${{ inputs.course }}" \
            '{jwt: $jwt, course: $course, gate_passed: true}')

          echo "Enviando para ${{ inputs.api_url }}/v1/validate ..."
          RESP=$(curl -sS -X POST "${{ inputs.api_url }}/v1/validate" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          echo "Resposta da API:"
          echo "$RESP" | jq .

          # 3) Falha o job se a API nao aprovou (status != approved).
          echo "$RESP" | jq -e '.status == "approved"' > /dev/null \
            || { echo "Validacao NAO aprovada."; exit 1; }
